<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GCL — IPL Bottom Bar Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

/* ── Transparent background for OBS overlay ── */
body {
  background: transparent;
  width: 1280px;
  height: 720px;
  overflow: hidden;
  position: relative;
  font-family: 'Barlow Condensed', sans-serif;
}

/* ════════════════════════════
   BOTTOM BAR — IPL STYLE
════════════════════════════ */
#bottom-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 68px;
  display: flex;
  align-items: stretch;
  font-family: 'Barlow Condensed', sans-serif;
  filter: drop-shadow(0 -4px 20px rgba(0,0,0,0.8));
}

/* ── LEFT: Batting Team Block ── */
.bat-team-block {
  display: flex;
  align-items: center;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
  padding: 0 14px 0 12px;
  gap: 10px;
  min-width: 170px;
  position: relative;
  clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 100%, 0 100%);
}
.bat-team-block::after {
  content:'';
  position:absolute; top:0; left:0; right:0;
  height:3px;
  background: linear-gradient(90deg, var(--team1-color, #FFD700), transparent);
}
.team-logo-circle {
  width: 42px; height: 42px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  font-weight: 900;
  color: #fff;
  flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.2);
  background: var(--team1-color, #e67e22);
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}
.bat-team-info { display: flex; flex-direction: column; gap: 1px; }
.bat-team-name {
  font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.5);
  letter-spacing: 2px; text-transform: uppercase;
}
.bat-team-score-row { display: flex; align-items: baseline; gap: 5px; }
.bat-runs {
  font-family: 'Teko', sans-serif;
  font-size: 36px; font-weight: 700;
  color: #fff; line-height: 1;
  letter-spacing: -1px;
}
.bat-wkts {
  font-family: 'Teko', sans-serif;
  font-size: 24px; color: rgba(255,255,255,0.5); font-weight: 500;
}
.bat-overs {
  font-size: 11px; color: rgba(255,255,255,0.35);
  letter-spacing: 0.5px; font-weight: 600;
}

/* ── BATSMEN SECTION ── */
.batsmen-block {
  background: #0d1117;
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 4px;
  border-left: 1px solid rgba(255,255,255,0.06);
}
.batsman-entry {
  display: flex;
  flex-direction: column;
  gap: 1px;
  padding: 4px 10px;
  position: relative;
}
.batsman-entry.on-strike {
  background: rgba(255, 214, 0, 0.06);
  border-radius: 3px;
}
.batsman-entry.on-strike::before {
  content: '●';
  position: absolute;
  left: 2px; top: 50%;
  transform: translateY(-50%);
  font-size: 5px;
  color: #FFD700;
  animation: strikeDot 1.2s ease-in-out infinite;
}
@keyframes strikeDot { 0%,100%{opacity:1} 50%{opacity:0.2} }

.bat-name {
  font-size: 13px; font-weight: 800; color: #f0f0f0;
  letter-spacing: 0.5px; text-transform: uppercase;
  line-height: 1;
}
.on-strike .bat-name { color: #FFD700; }
.bat-stat {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px; color: rgba(255,255,255,0.45);
  line-height: 1;
}
.on-strike .bat-stat { color: rgba(255,214,0,0.7); }
.bat-sep {
  width: 1px; height: 32px;
  background: rgba(255,255,255,0.08);
  margin: 0 2px;
}

/* ── THIS OVER BALLS ── */
.over-block {
  background: #0a0e15;
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 3px;
  border-left: 1px solid rgba(255,255,255,0.05);
  border-right: 1px solid rgba(255,255,255,0.05);
}
.over-label-vert {
  display: flex; flex-direction: column; align-items: center;
  margin-right: 4px;
}
.over-label-text {
  font-size: 7px; font-weight: 700; color: rgba(255,255,255,0.2);
  letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap;
  writing-mode: vertical-rl; transform: rotate(180deg);
}
.ball-pip {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800;
  font-family: 'Share Tech Mono', monospace;
  border: 1.5px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.03);
}
.ball-pip.dot  { border-color:rgba(255,255,255,0.2); color:rgba(255,255,255,0.3); }
.ball-pip.run  { background:rgba(0,200,83,0.15); border-color:#00C853; color:#00C853; }
.ball-pip.four { background:rgba(41,121,255,0.2); border-color:#2979FF; color:#2979FF; }
.ball-pip.six  { background:rgba(255,107,0,0.2); border-color:#FF6B00; color:#FF6B00; box-shadow:0 0 6px rgba(255,107,0,0.4); }
.ball-pip.wkt  { background:rgba(255,23,68,0.2); border-color:#FF1744; color:#FF1744; box-shadow:0 0 6px rgba(255,23,68,0.3); }
.ball-pip.wd   { background:rgba(255,214,0,0.1); border-color:#FFD700; color:#FFD700; font-size:8px; }

/* ── CENTER: MATCH INFO ── */
.center-block {
  flex: 1;
  background: linear-gradient(180deg, #0d1117 0%, #0a0e15 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  border-left: 1px solid rgba(255,255,255,0.05);
  border-right: 1px solid rgba(255,255,255,0.05);
  position: relative;
  min-width: 130px;
}
.center-block::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, #FFD700, transparent);
  opacity: 0.4;
}
.gcl-badge {
  font-size: 9px; font-weight: 900; letter-spacing: 3px;
  color: #FFD700; text-transform: uppercase;
  background: rgba(255,214,0,0.08);
  padding: 1px 7px; border-radius: 2px;
  border: 1px solid rgba(255,214,0,0.2);
}
.match-info-text {
  font-size: 10px; color: rgba(255,255,255,0.3);
  letter-spacing: 1px; font-weight: 600; text-align: center;
  line-height: 1.2;
}
/* Inn2 target info */
.target-info {
  font-size: 11px; font-weight: 800; color: #FF6B00;
  letter-spacing: 0.5px; text-align: center;
  display: none;
}
.crr-rrr-row {
  display: flex; gap: 8px;
  display: none;
}
.crr-badge, .rrr-badge {
  font-size: 9px; font-weight: 700;
  font-family: 'Share Tech Mono', monospace;
  padding: 1px 6px; border-radius: 2px;
  letter-spacing: 0.5px;
}
.crr-badge { background: rgba(0,200,83,0.12); color: #00C853; border: 1px solid rgba(0,200,83,0.25); }
.rrr-badge { background: rgba(255,107,0,0.12); color: #FF8C42; border: 1px solid rgba(255,107,0,0.25); }

/* ── BOWLER SECTION ── */
.bowler-block {
  background: #0d1117;
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 8px;
  border-left: 1px solid rgba(255,255,255,0.06);
}
.bowler-inner { display: flex; flex-direction: column; gap: 1px; }
.bowl-tag {
  font-size: 8px; font-weight: 700; color: rgba(255,107,0,0.5);
  letter-spacing: 2px; text-transform: uppercase; line-height: 1;
}
.bowl-name {
  font-size: 15px; font-weight: 800; color: #f0f0f0;
  letter-spacing: 0.5px; text-transform: uppercase; line-height: 1;
}
.bowl-fig {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; color: rgba(255,255,255,0.4);
}

/* ── RIGHT: Bowling Team / Target Score ── */
.bowl-team-block {
  display: flex;
  align-items: center;
  background: linear-gradient(135deg, #0f3460 0%, #16213e 40%, #1a1a2e 100%);
  padding: 0 12px 0 16px;
  gap: 10px;
  min-width: 155px;
  position: relative;
  clip-path: polygon(12px 0, 100% 0, 100% 100%, 0 100%);
}
.bowl-team-block::after {
  content:'';
  position:absolute; bottom:0; left:0; right:0;
  height:3px;
  background: linear-gradient(90deg, transparent, var(--team2-color, #3498db));
}
.bowl-team-info { display: flex; flex-direction: column; gap: 1px; align-items: flex-end; }
.bowl-team-name {
  font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.5);
  letter-spacing: 2px; text-transform: uppercase;
}
.bowl-team-score {
  font-family: 'Teko', sans-serif;
  font-size: 28px; font-weight: 600;
  color: rgba(255,255,255,0.45); line-height: 1;
}
.bowl-team-score.inn1 { color: rgba(255,255,255,0.25); font-size: 20px; }
.team-logo-circle-2 {
  width: 38px; height: 38px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 900; color: #fff;
  flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.15);
  background: var(--team2-color, #3498db);
}

/* Top accent line */
#bottom-bar::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg,
    var(--team1-color, #e67e22) 0%,
    #FFD700 30%,
    rgba(255,255,255,0.1) 50%,
    #FFD700 70%,
    var(--team2-color, #3498db) 100%
  );
}

/* ── LIVE PILL (top right) ── */
#live-pill {
  position: absolute;
  top: -36px; right: 16px;
  background: #FF2D55;
  border-radius: 4px;
  padding: 4px 12px;
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 800; color: #fff;
  letter-spacing: 2px;
  box-shadow: 0 0 16px rgba(255,45,85,0.5);
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #fff;
  animation: liveBlink 1s ease-in-out infinite;
}
@keyframes liveBlink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.2;transform:scale(1.4)} }

/* ── MATCH OVER BANNER ── */
#match-over-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 68px;
  display: none;
  align-items: center;
  justify-content: center;
  gap: 0;
  background: linear-gradient(90deg, #0d0600, #1a0d00, #0d0600);
  border-top: 2px solid #FFD700;
}
#match-over-bar.show { display: flex; }
.mo-trophy { font-size: 28px; padding: 0 16px; }
.mo-winner-wrap { text-align: center; }
.mo-winner-label { font-size: 9px; color: rgba(255,200,0,0.5); letter-spacing: 3px; font-weight: 700; text-transform: uppercase; }
.mo-winner-name { font-family: 'Teko', sans-serif; font-size: 34px; font-weight: 700; color: #FFD700; letter-spacing: 4px; line-height: 1; }
.mo-margin { font-size: 12px; color: rgba(255,255,255,0.5); letter-spacing: 1px; }
.mo-divider { width: 1px; height: 40px; background: rgba(255,214,0,0.2); margin: 0 20px; }
.mo-scores { display: flex; align-items: center; gap: 12px; }
.mo-team { text-align: center; }
.mo-tname { font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 2px; font-weight: 700; }
.mo-tscore { font-family: 'Teko', sans-serif; font-size: 26px; font-weight: 600; color: #fff; line-height: 1; }
.mo-team.win .mo-tname { color: #FFD700; }
.mo-team.win .mo-tscore { color: #FFD700; }
.mo-vs { font-size: 10px; color: rgba(255,255,255,0.15); letter-spacing: 2px; }
</style>
</head>
<body>

<!-- ── LIVE BOTTOM BAR ── -->
<div id="bottom-bar">

  <!-- Live pill -->
  <div id="live-pill">
    <div class="live-dot"></div>LIVE
  </div>

  <!-- LEFT: Batting team -->
  <div class="bat-team-block">
    <div class="team-logo-circle" id="bat-logo">K</div>
    <div class="bat-team-info">
      <div class="bat-team-name" id="bat-tname">KRISHNA</div>
      <div class="bat-team-score-row">
        <div class="bat-runs" id="bat-runs">0</div>
        <div class="bat-wkts">/<span id="bat-wkts">0</span></div>
      </div>
      <div class="bat-overs" id="bat-overs">0.0 ov</div>
    </div>
  </div>

  <!-- Batsmen -->
  <div class="batsmen-block">
    <div class="batsman-entry on-strike" id="striker-entry">
      <div class="bat-name" id="striker-name">P1</div>
      <div class="bat-stat" id="striker-stat">0(0)</div>
    </div>
    <div class="bat-sep"></div>
    <div class="batsman-entry" id="nonstriker-entry">
      <div class="bat-name" id="nonstriker-name">P2</div>
      <div class="bat-stat" id="nonstriker-stat">0(0)</div>
    </div>
  </div>

  <!-- This over balls -->
  <div class="over-block">
    <div class="over-label-vert">
      <div class="over-label-text">THIS OVER</div>
    </div>
    <div id="ball-pips" style="display:flex;gap:3px;align-items:center"></div>
  </div>

  <!-- CENTER: Match info -->
  <div class="center-block">
    <div class="gcl-badge">GCL</div>
    <div class="match-info-text" id="center-info">5 OVERS FORMAT</div>
    <div class="target-info" id="target-info">Need — off — balls</div>
    <div class="crr-rrr-row" id="crr-rrr-row">
      <div class="crr-badge" id="crr-val">CRR 0.00</div>
      <div class="rrr-badge" id="rrr-val">RRR 0.00</div>
    </div>
  </div>

  <!-- Bowler -->
  <div class="bowler-block">
    <div class="bowler-inner">
      <div class="bowl-tag">Bowling</div>
      <div class="bowl-name" id="bowl-name">B1</div>
      <div class="bowl-fig" id="bowl-fig">0-0 (0.0)</div>
    </div>
  </div>

  <!-- RIGHT: Bowling team -->
  <div class="bowl-team-block">
    <div class="bowl-team-info">
      <div class="bowl-team-name" id="bowl-tname">SANGAM</div>
      <div class="bowl-team-score" id="bowl-score">—</div>
    </div>
    <div class="team-logo-circle-2" id="bowl-logo">S</div>
  </div>

</div>

<!-- ── MATCH OVER BAR ── -->
<div id="match-over-bar">
  <div class="mo-trophy">🏆</div>
  <div class="mo-winner-wrap">
    <div class="mo-winner-label">Winner</div>
    <div class="mo-winner-name" id="mo-winner">—</div>
    <div class="mo-margin" id="mo-margin">—</div>
  </div>
  <div class="mo-divider"></div>
  <div class="mo-scores">
    <div class="mo-team" id="mo-t1">
      <div class="mo-tname" id="mo-t1name">—</div>
      <div class="mo-tscore" id="mo-t1score">—</div>
    </div>
    <div class="mo-vs">VS</div>
    <div class="mo-team" id="mo-t2">
      <div class="mo-tname" id="mo-t2name">—</div>
      <div class="mo-tscore" id="mo-t2score">—</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBRP-XU8V_Zqyj7frr8MArNcPWp2r1NMz8",
  authDomain: "gcl-score.firebaseapp.com",
  databaseURL: "https://gcl-score-default-rtdb.firebaseio.com",
  projectId: "gcl-score"
};

const TEAMS = ["KRISHNA","SANGAM","LOVELY","XYZ"];
const MAX_WICKETS = 3;

// Team colours + initials
const TEAM_META = {
  KRISHNA: { color:'#e67e22', init:'K' },
  SANGAM:  { color:'#2980b9', init:'S' },
  LOVELY:  { color:'#27ae60', init:'L' },
  XYZ:     { color:'#8e44ad', init:'X' },
};

try {
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  onValue(ref(db,'gcl/match'), snap => {
    if (snap.exists()) render(snap.val());
  });
} catch(e) { console.warn('Firebase offline — preview mode'); }

function render(state) {
  if (!state) return;

  if (state.matchOver) {
    showMatchOver(state); return;
  }

  document.getElementById('bottom-bar').style.display = 'flex';
  document.getElementById('match-over-bar').classList.remove('show');

  const inn = state.innings - 1;
  const batTeam = TEAMS[state.batting] || '—';
  const bowlTeam = TEAMS[state.bowling] || '—';
  const batMeta = TEAM_META[batTeam] || { color:'#FFD700', init:batTeam[0] };
  const bowlMeta = TEAM_META[bowlTeam] || { color:'#888', init:bowlTeam[0] };

  // Team colours via CSS vars
  document.documentElement.style.setProperty('--team1-color', batMeta.color);
  document.documentElement.style.setProperty('--team2-color', bowlMeta.color);

  // Batting team
  document.getElementById('bat-logo').textContent = batMeta.init;
  document.getElementById('bat-logo').style.background = batMeta.color;
  document.getElementById('bat-tname').textContent = batTeam;
  document.getElementById('bat-runs').textContent = state.runs?.[inn] ?? 0;
  document.getElementById('bat-wkts').textContent = state.wickets?.[inn] ?? 0;
  document.getElementById('bat-overs').textContent = (state.overs||0)+'.'+(state.balls||0)+' ov';

  // Bowling team
  document.getElementById('bowl-logo').textContent = bowlMeta.init;
  document.getElementById('bowl-logo').style.background = bowlMeta.color;
  document.getElementById('bowl-tname').textContent = bowlTeam;

  // Inn2: show inn1 score on right
  if (state.innings === 2 && state.runs?.[0] !== undefined) {
    const el = document.getElementById('bowl-score');
    el.textContent = state.runs[0]+'/'+(state.wickets?.[0]??0);
    el.className = 'bowl-team-score';

    // Target / CRR / RRR
    const needed = (state.target||0) - (state.runs[1]||0);
    const ballsLeft = 30 - ((state.overs||0)*6+(state.balls||0));
    const ballsDone = (state.overs||0)*6+(state.balls||0);
    const crr = ballsDone > 0 ? ((state.runs[1]||0)/(ballsDone/6)).toFixed(2) : '0.00';
    const rrr = ballsLeft > 0 ? (needed/(ballsLeft/6)).toFixed(2) : '—';

    document.getElementById('center-info').style.display = 'none';
    document.getElementById('target-info').style.display = 'block';
    document.getElementById('target-info').textContent = `Need ${needed} off ${ballsLeft} balls`;
    document.getElementById('crr-rrr-row').style.display = 'flex';
    document.getElementById('crr-val').textContent = 'CRR '+crr;
    document.getElementById('rrr-val').textContent = 'RRR '+rrr;
  } else {
    document.getElementById('bowl-score').textContent = '—';
    document.getElementById('bowl-score').className = 'bowl-team-score inn1';
    document.getElementById('center-info').style.display = '';
    document.getElementById('target-info').style.display = 'none';
    document.getElementById('crr-rrr-row').style.display = 'none';
  }

  // Batsmen
  const s  = state.players?.bat?.[state.striker];
  const ns = state.players?.bat?.[state.nonStriker];
  if (s) {
    document.getElementById('striker-name').textContent = s.name.toUpperCase();
    document.getElementById('striker-stat').textContent = s.runs+'('+s.balls+')';
  }
  if (ns) {
    document.getElementById('nonstriker-name').textContent = ns.name.toUpperCase();
    document.getElementById('nonstriker-stat').textContent = ns.runs+'('+ns.balls+')';
  }

  // Ball pips
  const pips = document.getElementById('ball-pips');
  pips.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const pip = document.createElement('div');
    pip.className = 'ball-pip';
    const ev = (state.currentOverBalls||[])[i];
    if (ev === undefined || ev === null) { pip.textContent = '·'; }
    else if (ev === 'W')  { pip.classList.add('wkt');  pip.textContent = 'W'; }
    else if (ev === 'Wd' || ev === 'Nb') { pip.classList.add('wd'); pip.textContent = ev; }
    else if (ev === 0)   { pip.classList.add('dot');  pip.textContent = '•'; }
    else if (ev === 4)   { pip.classList.add('four'); pip.textContent = '4'; }
    else if (ev === 6)   { pip.classList.add('six');  pip.textContent = '6'; }
    else                 { pip.classList.add('run');  pip.textContent = ev; }
    pips.appendChild(pip);
  }

  // Bowler
  const bwl = state.players?.bowl?.[state.bowler];
  if (bwl) {
    document.getElementById('bowl-name').textContent = bwl.name.toUpperCase();
    document.getElementById('bowl-fig').textContent = bwl.wkts+'-'+bwl.runs+' ('+bwl.overs+'.'+bwl.balls+')';
  }
}

function showMatchOver(state) {
  document.getElementById('bottom-bar').style.display = 'none';
  document.getElementById('match-over-bar').classList.add('show');

  const bat1Idx = state._bat1TeamIdx ?? (state.innings===2 ? state.bowling : state.batting);
  const bat2Idx = state._bat2TeamIdx ?? (state.innings===2 ? state.batting : state.bowling);
  const r0 = state.runs?.[0]??0, w0 = state.wickets?.[0]??0;
  const r1 = state.runs?.[1]??0, w1 = state.wickets?.[1]??0;

  let winner='', margin='';
  if (r0>r1) { winner=TEAMS[bat1Idx]; margin=TEAMS[bat1Idx]+' won by '+(r0-r1)+' runs'; }
  else if (r1>r0) { const wl=MAX_WICKETS-w1; winner=TEAMS[bat2Idx]; margin=TEAMS[bat2Idx]+' won by '+wl+' wicket'+(wl!==1?'s':''); }
  else { winner='MATCH TIED 🤝'; margin=''; }

  document.getElementById('mo-winner').textContent = winner;
  document.getElementById('mo-margin').textContent = margin;
  document.getElementById('mo-t1name').textContent = TEAMS[bat1Idx];
  document.getElementById('mo-t1score').textContent = r0+'/'+w0;
  document.getElementById('mo-t2name').textContent = TEAMS[bat2Idx];
  document.getElementById('mo-t2score').textContent = r1+'/'+w1;
  document.getElementById('mo-t1').classList.toggle('win', r0>r1);
  document.getElementById('mo-t2').classList.toggle('win', r1>r0);
}
